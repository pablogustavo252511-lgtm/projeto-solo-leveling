services:
  - type: web
    name: projeto-solo-leveling
    runtime: node
    plan: free
    rootDir: solo-leveling-system/backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: USE_LOCAL_DB
        value: "true"
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true

