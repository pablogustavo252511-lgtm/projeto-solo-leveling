services:
  - type: web
    name: projeto-solo-leveling
    runtime: node
    plan: free
    region: oregon
    rootDir: solo-leveling-system/backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_LOCAL_DB
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true
