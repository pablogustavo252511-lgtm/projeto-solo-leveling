services:
  - type: web
    name: projeto-solo-leveling
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run prisma:generate
    preDeployCommand: npm run prisma:push && npm run db:migrate-json
    startCommand: node server.js
    envVars:
      - key: USE_LOCAL_DB
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true
