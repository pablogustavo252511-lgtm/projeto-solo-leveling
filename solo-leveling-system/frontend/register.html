<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Daily Hunter</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <main class="auth-panel">
    <div class="brand-lockup">
      <span class="brand-mark">SL</span>
      <h1>Cadastro</h1>
      <p>Nivel 1, XP 0, Rank E.</p>
    </div>
    <form data-register-form class="form-stack">
      <label>Nome<input name="nome" type="text" required></label>
      <label>Email<input name="email" type="email" required></label>
      <label>Senha<input name="senha" type="password" required minlength="6"></label>
      <button type="submit">Despertar Hunter</button>
      <p data-message class="system-message"></p>
    </form>
    <a class="text-link" href="login.html">Ja tenho conta</a>
  </main>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
