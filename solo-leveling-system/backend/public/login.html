<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Daily Hunter</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <main class="auth-panel">
    <div class="brand-lockup">
      <span class="brand-mark">SL</span>
      <h1>Login</h1>
      <p>Entre no sistema do hunter.</p>
    </div>
    <form data-login-form class="form-stack">
      <label>Email<input name="email" type="email" required></label>
      <label>Senha<input name="senha" type="password" required></label>
      <button type="submit">Entrar</button>
      <p data-message class="system-message"></p>
    </form>
    <a class="text-link" href="register.html">Criar novo hunter</a>
  </main>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
