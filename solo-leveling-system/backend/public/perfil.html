<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - Daily Hunter</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div data-shell></div>
  <main class="app-main">
    <section class="page-title">
      <span class="eyebrow">Evolucao</span>
      <h1>Perfil do Hunter</h1>
      <p>Historico de XP, level ups, penalidades, desafios e bosses.</p>
    </section>

    <p data-message class="system-message"></p>

    <section class="content-grid">
      <article class="panel">
        <h2>Dados do jogador</h2>
        <div data-profile></div>
      </article>
      <article class="panel">
        <h2>Historico de evolucao</h2>
        <div data-history class="timeline"></div>
      </article>
    </section>
  </main>
  <script src="js/api.js"></script>
  <script src="js/perfil.js"></script>
</body>
</html>
